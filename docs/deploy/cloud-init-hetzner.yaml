#cloud-config

hostname: muckrake-prod-01
manage_etc_hosts: true

timezone: UTC

users:
  - default
  - name: deploy
    gecos: Deployment User
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true
    ssh_authorized_keys:
      - "ssh-ed25519 AAAA_REPLACE_WITH_YOUR_PUBLIC_KEY deploy@muckrake-prod-01"

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges

write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowUsers deploy

  - path: /etc/fail2ban/jail.d/sshd.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      maxretry = 5
      bantime = 1h
      findtime = 10m

  - path: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root:root
    permissions: "0644"
    content: |
      Unattended-Upgrade::Automatic-Reboot "false";

runcmd:
  - [systemctl, daemon-reload]
  - [systemctl, restart, ssh]
  - [systemctl, enable, --now, fail2ban]
  - [systemctl, enable, --now, unattended-upgrades]
  - [ufw, --force, default, deny, incoming]
  - [ufw, --force, default, allow, outgoing]
  - [ufw, allow, 22/tcp]
  - [ufw, allow, 80/tcp]
  - [ufw, allow, 443/tcp]
  - [ufw, --force, enable]

final_message: "Cloud-init complete. Login as 'deploy' with your SSH key."
