  description: The Office of the Registrar of Consultant Lobbyists was set up by the Transparency of Lobbying, Non-Party Campaigning and Trade Union Administration Act 2014 to ensure transparency in the work of consultant lobbyists and their engagement with Ministers and Permanent Secretaries on behalf of clients.
