  title: PRCA Professional Lobbying Register
  summary: The Professional Lobbying Register is held by the PRCA to promote and maintain transparency in the Professional Lobbying activities of Members and, where appropriate, their employees or contractors. The Register lists all Members engaged in Professional Lobbying, their clients and other specified information. It is updated on a quarterly basis and is publicly available.
