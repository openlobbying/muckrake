  name: Public Relations and Communications Association (PRCA)
  description: The Public Relations and Communications Association (PRCA) is the world's leading professional body for professionals in public relations, communications, and public affairs. Through our global community we work towards an industry that is known worldwide for its innovation, excellence and ethical standards.
